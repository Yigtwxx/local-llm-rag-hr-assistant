# Follow-up questions offered as chips after an answer.
#
# Drafted by `uv run python -m app.gen_suggestions`, then reviewed by hand
# before being committed. `app.ingest` reads this file, never the model, so the
# questions shown in the interface are always ones a person has read.
#
# Every question must be answerable from its own passage. Editing or deleting a
# line here is expected; re-run ingest afterwards.
#
# The first review pass rewrote 20 of the 74 drafts. One was rejected outright:
# "Nöbet primi ne kadar?" — section 5 of the working-hours policy promises a
# fixed on-call premium but never states an amount, so the assistant would have
# refused its own suggestion. The rest were Turkish that no employee would type,
# or framings the passage does not support ("Ofis günleri Salı mı yoksa Perşembe
# mi?" — the default is both).
