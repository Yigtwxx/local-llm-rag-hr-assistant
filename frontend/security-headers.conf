# Response headers shared by every location.
#
# This is a snippet rather than five lines in the server block because nginx
# inherits `add_header` only into blocks that declare none of their own. A
# location that sets so much as a Cache-Control header drops the whole set, so
# every such block includes this file instead of repeating it.
#
# The CSP is as tight as the app allows: no CDN, fonts are bundled through
# @fontsource, the API is same-origin behind this proxy, and nothing renders
# untrusted HTML. `style-src 'unsafe-inline'` is the one concession — several
# components (BorderGlow, SpotlightCard, ShinyText …) set style attributes,
# which CSP treats as inline styles.

add_header X-Content-Type-Options "nosniff" always;
add_header X-Frame-Options "DENY" always;
add_header Referrer-Policy "no-referrer" always;
add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
