server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    include /etc/nginx/snippets/security-headers.conf;

    # The SPA owns its routing; anything that is not a real file falls back to
    # index.html so a reloaded deep link does not 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed assets are immutable, index.html must never be cached.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        # Declaring an add_header here drops the ones inherited from the server
        # block, so the security headers have to be pulled back in.
        include /etc/nginx/snippets/security-headers.conf;
    }

    location /api/ {
        # Docker's embedded DNS. Resolving through a variable rather than a
        # literal upstream name matters twice: nginx would otherwise refuse to
        # start if the backend is not yet resolvable, and it would cache the
        # backend's first IP forever — a restarted backend gets a new one.
        # With a variable, proxy_pass no longer appends the URI itself, hence
        # the explicit path below.
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $backend_upstream http://backend:8000;

        # $uri, not $request_uri: nginx matches this location against the
        # decoded and normalised path, so forwarding the raw one would let the
        # backend see something other than what was matched here. The query
        # string is passed through untouched.
        #
        # The trade-off is that $uri is decoded — a path segment containing a
        # space or a non-ASCII character would corrupt the proxied request
        # line. Today's routes (/api/health, /api/models, /api/chat, /api/bench)
        # are static ASCII; revisit this line before adding one like
        # /api/sources/{filename}.
        proxy_pass $backend_upstream$uri$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # /api/chat streams tokens over SSE. With buffering on, nginx holds the
        # whole answer and delivers it in one block — the streaming UI is then
        # indistinguishable from a frozen one.
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection "";
        chunked_transfer_encoding off;

        # A long answer on a cold model can take minutes.
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}
